<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index,follow" />
    <meta name="description" content="GraceChords provides free worship chord sheets and lyrics for churches, worship teams, and believers." />
    <title>GraceChords</title>
    <!-- Preconnect to Supabase so DNS + TLS happen in parallel with HTML parsing -->
    <link rel="preconnect" href="https://tndnjetevtgohunqpzbi.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://tndnjetevtgohunqpzbi.supabase.co" />
    <!-- Preload variable font to cut requests and improve LCP -->
    <link
      rel="preload"
      href="/fonts/Inter-Variable.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <!-- Favicon bundle (Signal Blue brand mark; path-versioned under /icons/v2 to bust caches) -->
    <link rel="icon" type="image/svg+xml" href="/icons/v2/favicon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/v2/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/v2/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/v2/favicon-16x16.png">
    <link rel="shortcut icon" href="/icons/v2/favicon.ico">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F5F7F9">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#14171A">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
