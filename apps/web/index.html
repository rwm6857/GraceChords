<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index,follow" />
    <meta name="description" content="GraceChords provides free worship chord sheets and lyrics for churches, worship teams, and believers." />
    <title>GraceChords</title>
    <!-- App name in the raw HTML head so crawlers and Google's OAuth branding
         review read "GraceChords" without executing JS. og:site_name and the
         WebSite/Organization JSON-LD declare the name explicitly; the React app
         (react-helmet) refines these per route after mount. -->
    <meta property="og:site_name" content="GraceChords" />
    <meta property="og:title" content="GraceChords" />
    <meta property="application-name" content="GraceChords" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "GraceChords",
        "alternateName": "GraceChords.com",
        "url": "https://gracechords.com/",
        "publisher": {
          "@type": "Organization",
          "name": "GraceChords",
          "url": "https://gracechords.com/"
        }
      }
    </script>
    <!-- Preconnect to Supabase so DNS + TLS happen in parallel with HTML parsing -->
    <link rel="preconnect" href="https://tndnjetevtgohunqpzbi.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://tndnjetevtgohunqpzbi.supabase.co" />
    <!-- Preload variable font to cut requests and improve LCP -->
    <link
      rel="preload"
      href="/fonts/Inter-Variable.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <!-- Favicon bundle (Signal Blue brand mark; path-versioned under /icons/v2 to bust caches) -->
    <link rel="icon" type="image/svg+xml" href="/icons/v2/favicon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/v2/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/v2/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/v2/favicon-16x16.png">
    <link rel="shortcut icon" href="/icons/v2/favicon.ico">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F5F7F9">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#14171A">
  </head>
  <body>
    <div id="root">
      <!-- Crawler-visible fallback for OAuth branding verification. Visually
           hidden (no flash before React mounts) but present in the raw HTML
           and accessibility tree. React replaces #root on mount. Uses inline
           styles on each element rather than a wrapper <div>, because the
           post-build SEO script matches #root with a non-greedy regex that
           stops at the first </div>. -->
      <h1 style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0">GraceChords</h1>
      <p style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0">GraceChords is a free, open-source worship tool for churches and worship teams to browse chord charts, build service setlists, and create printable songbooks.</p>
    </div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
