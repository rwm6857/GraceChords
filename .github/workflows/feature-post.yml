name: Notify dev channel on flagged merge

# Fires on merge when ANY of the following is true:
#   1. PR title starts with "feat(" or "feat:" — new user-visible features
#      are announced by default.
#   2. PR is labelled "post" — manual override for non-feat changes worth
#      announcing (e.g. a significant fix).
#   3. PR title or body contains "#post" — same intent as the label, but
#      settable at commit time without touching the GitHub UI.
#
# This is a coarse gate. The worker (feature.js) applies the finer rules in
# one auditable place: it skips empty-body PRs and backend-only scopes
# (feat(cli), feat(worker), feat(ci), …) that mean nothing to end users.
# The `post` label and "#post" marker set FORCE_POST below, which tells the
# worker to bypass the backend-scope skip — that's the manual override.

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    if: >-
      github.event.pull_request.merged == true &&
      (
        startsWith(github.event.pull_request.title, 'feat(') ||
        startsWith(github.event.pull_request.title, 'feat:') ||
        contains(github.event.pull_request.labels.*.name, 'post') ||
        contains(github.event.pull_request.title, '#post') ||
        contains(github.event.pull_request.body, '#post')
      )
    runs-on: ubuntu-latest
    steps:
      - name: POST to bot worker
        env:
          BOT_WORKER_URL: ${{ secrets.BOT_WORKER_URL }}
          BOT_WEBHOOK_TOKEN: ${{ secrets.BOT_WEBHOOK_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          # Explicit opt-in (label or "#post") → force the post through even
          # if the scope looks backend-only.
          FORCE_POST: ${{ contains(github.event.pull_request.labels.*.name, 'post') || contains(github.event.pull_request.title, '#post') || contains(github.event.pull_request.body, '#post') }}
        run: |
          if [ -z "${BOT_WORKER_URL:-}" ] || [ -z "${BOT_WEBHOOK_TOKEN:-}" ]; then
            echo "BOT_WORKER_URL or BOT_WEBHOOK_TOKEN not set; skipping."
            exit 0
          fi

          # Strip the "#post" marker from the title before sending so it
          # doesn't appear in the user-facing announcement. The worker
          # strips the conventional-commit prefix itself.
          cleaned_title=$(printf '%s' "$PR_TITLE" | sed -E 's/[[:space:]]*#post\b//gi' | sed -E 's/[[:space:]]+$//')

          # Use jq to safely encode env vars into JSON (handles quotes/newlines).
          payload=$(jq -n \
            --arg title "$cleaned_title" \
            --arg summary "$PR_BODY" \
            --arg url "$PR_URL" \
            --argjson force "${FORCE_POST:-false}" \
            '{title:$title, summary:$summary, url:$url, force:$force}')

          curl -sS -X POST "${BOT_WORKER_URL%/}/internal/feature" \
            -H "Authorization: Bearer $BOT_WEBHOOK_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload"
