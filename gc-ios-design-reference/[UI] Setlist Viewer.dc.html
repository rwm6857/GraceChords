<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<x-import component-from-global-scope="IOSDevice" from="./ios-frame.jsx" dark="{{ true }}" hint-size="402px,874px">
  <dc-import name="SetlistViewerContent" start-index="{{ startIndex }}" chord-style="{{ chordStyle }}" style="width:100%;height:100%;" hint-size="100%,100%"></dc-import>
</x-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:402,&quot;height&quot;:874},&quot;startAt&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:3,&quot;min&quot;:1,&quot;max&quot;:6,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Setlist&quot;},&quot;chordStyle&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;letters&quot;,&quot;numbers&quot;,&quot;solfege&quot;],&quot;default&quot;:&quot;letters&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Display&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const raw = parseInt(this.props.startAt, 10);
    return {
      startIndex: (isNaN(raw) ? 3 : raw) - 1,
      chordStyle: this.props.chordStyle || 'letters',
    };
  }
}
</script>
</body>
</html>
