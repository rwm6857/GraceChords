# Required secrets — set with `wrangler secret put` before deploying:
#   TELEGRAM_BOT_TOKEN        — bot API token from BotFather
#   TELEGRAM_WEBHOOK_SECRET   — random token validated on each Telegram webhook
#   DEV_CHANNEL_ID            — channel ID (negative integer)
#   GRACECHORDS_API_BASE      — https://www.gracechords.com/api/bot
#   GRACECHORDS_API_TOKEN     — matches the site's BOT_API_TOKEN env
#   SUPABASE_URL              — e.g. https://xyz.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY — read-only role recommended for digest queries
#   BOT_WEBHOOK_TOKEN         — shared with the GitHub Action and with
#                               the Pages Function /api/telegram/push,
#                               which calls /internal/push to deliver
#                               web-initiated charts to linked users.
#   MEDIA_STAGING_CHAT_ID     — private chat the bot uploads JPGs to so it
#                               can capture file_ids for guest-message
#                               photo replies. Typically a 1-person private
#                               channel containing just you + the bot, with
#                               both Post and Delete permissions granted to
#                               the bot. Each request stages + deletes; no
#                               messages accumulate. Without it, guest
#                               replies fall back to text.

name = "gracechords-telegram-bot"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Mon + Fri 17:00 ET. UTC offset shifts by 1h across DST — we accept the drift
# rather than skip half the year (see plan).
[triggers]
crons = ["0 22 * * 1,5"]

# Single KV namespace for: per-user rate limits, last_digest_at, and short-lived
# disambiguation tokens. Provision with:
#   wrangler kv:namespace create BOT_KV
# Paste the returned id below before first deploy.
[[kv_namespaces]]
binding = "BOT_KV"
id = "7c716aa9f03e4cf7bc89a3ed477270a7"

# R2 holds the Noto TTFs the PDF renderer uses (under fonts/ prefix). The
# bucket already exists for pptx-upload; we just bind it here. Upload the
# six TTFs from src/assets/fonts/ before deploying; see README.md.
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "gracechords-bible"

# Workers AI — powers the friendly rewrite in feature.js. Free tier covers
# the ~daily volume of feature posts; if the call fails for any reason
# feature.js falls back to posting the raw PR body.
[ai]
binding = "AI"

[vars]
# Empty — every runtime value comes from `wrangler secret put`.

# pure.js lives at ../../src/utils/pdf_mvp/pure.js and imports `jspdf`. Node's
# module resolution walks up from that file and never sees the worker's local
# node_modules, so Cloudflare Workers Builds fails with "Could not resolve
# 'jspdf'". This alias tells esbuild to use the copy installed under the
# worker's package.json.
[alias]
"jspdf" = "./node_modules/jspdf"

# The shared ChordPro parser / transposition / song logic now lives in the
# @gracechords/core workspace package (packages/core). The worker's own
# `npm clean-install` only installs this package.json's deps, so the
# workspace symlink that would normally resolve `@gracechords/core/*` is
# absent and esbuild fails with "Could not resolve '@gracechords/core/...'".
# Point the package and its subpaths straight at the source. Wrangler's alias
# matches specifiers exactly (no subpath/directory aliasing), so each subpath
# the worker pulls in via the src/utils compatibility shims is listed
# explicitly. The keys carry the .js/.ts extension because the shims import
# the extension-qualified specifier — required so the Cloudflare Pages
# Functions bundler (which resolves core's "./*": "./src/*" exports map
# literally) can resolve the same shims for /api/export/song.
"@gracechords/core/chordpro/index.js" = "../../packages/core/src/chordpro/index.js"
"@gracechords/core/chordpro/parser.ts" = "../../packages/core/src/chordpro/parser.ts"
"@gracechords/core/songs/instrumental.js" = "../../packages/core/src/songs/instrumental.js"
"@gracechords/core/songs/sort.js" = "../../packages/core/src/songs/sort.js"

[observability]
enabled = true
